<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>digi·closet — Redesign canvas</title>

<!-- ext-resource-dependency: fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
:root{
  --bg:#F4EEE0;
  --bg-soft:#F8F3E8;
  --header:#EDE5D2;
  --surface:#FBF8F1;       /* photo tiles, floats */
  --surface-2:#EFE8D8;     /* muted chips / wells */
  --card:#F1EADA;          /* warm card */
  --card-2:#ECE3D1;
  --border:#E2D8C2;
  --border-soft:#EADFCB;
  --line:#DDD2BA;
  --ink:#3F3A31;
  --ink-soft:#6C665B;
  --muted:#9C9485;
  --faint:#BDB4A2;
  --clay:#BE6F4A;
  --clay-deep:#A65C3A;
  --clay-soft:#E7D2C2;
  --clay-tint:#F3E7DC;
  --sage:#8C9476;
  --shadow-sm:0 1px 2px rgba(63,58,49,.05), 0 1px 3px rgba(63,58,49,.06);
  --shadow-md:0 4px 14px rgba(63,58,49,.07), 0 1px 3px rgba(63,58,49,.05);
  --shadow-lg:0 18px 44px rgba(63,58,49,.13), 0 4px 12px rgba(63,58,49,.07);
  --shadow-float:0 14px 30px rgba(63,58,49,.16);
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-xl:30px;
  --display:"Bricolage Grotesque", system-ui, sans-serif;
  --body:"Hanken Grotesk", system-ui, sans-serif;
  --mono:"Space Mono", ui-monospace, monospace;
  --logo:"Fredoka", system-ui, sans-serif;
}

*{box-sizing:border-box;}

/* ---------- screen frame ---------- */
.dx{
  width:100%; height:100%;
  background:
    radial-gradient(120% 80% at 100% 0%, #F8F2E5 0%, var(--bg) 55%);
  color:var(--ink);
  font-family:var(--body);
  font-size:16px; line-height:1.45;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  display:flex; flex-direction:column;
  overflow:hidden; position:relative;
}
.dx ::-webkit-scrollbar{height:8px; width:8px;}
.dx ::-webkit-scrollbar-thumb{background:rgba(63,58,49,.16); border-radius:8px;}
.dx ::selection{background:var(--clay-soft);}

/* ---------- type ---------- */
.dx-display{ font-family:var(--display); font-weight:700; letter-spacing:-.02em; line-height:1.02; color:var(--ink); margin:0; }
.dx-h1{ font-family:var(--display); font-weight:700; letter-spacing:-.015em; line-height:1.05; margin:0; }
.dx-h2{ font-family:var(--display); font-weight:600; letter-spacing:-.01em; line-height:1.1; margin:0; }
.dx-eyebrow{ font-family:var(--mono); font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--clay); font-weight:700; margin:0; }
.dx-sub{ color:var(--ink-soft); margin:0; }
.dx-muted{ color:var(--muted); }
.dx-mono{ font-family:var(--mono); }

/* ---------- top bar ---------- */
.dx-top{
  flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
  padding:18px 40px;
  background:linear-gradient(var(--header), color-mix(in srgb, var(--header) 86%, #fff));
  border-bottom:1px solid var(--border);
}
.dx-logo{ display:flex; align-items:center; gap:11px; cursor:default; user-select:none; }
.dx-logo .mark{ color:var(--clay); display:flex; }
.dx-wordmark{
  font-family:var(--logo); font-weight:600; font-size:26px; letter-spacing:-.01em;
  color:var(--ink); line-height:1; display:flex; align-items:center; gap:.06em;
}
.dx-wordmark .dot{ color:var(--clay); font-weight:700; }
.dx-top-actions{ display:flex; align-items:center; gap:8px; }

/* ---------- nav (desktop primary nav row) ---------- */
.dx-nav{ display:flex; align-items:center; gap:4px; }
.dx-nav a{
  font-family:var(--body); font-weight:600; font-size:15px; color:var(--ink-soft);
  text-decoration:none; padding:9px 16px; border-radius:999px; transition:.16s;
  display:flex; align-items:center; gap:8px;
}
.dx-nav a:hover{ color:var(--ink); background:rgba(63,58,49,.05); }
.dx-nav a.active{ color:#fff; background:var(--ink); }
.dx-nav a.active .ic{ opacity:1; }

/* ---------- icon buttons ---------- */
.dx-iconbtn{
  width:42px; height:42px; border-radius:999px; border:1px solid var(--border);
  background:var(--bg-soft); color:var(--ink-soft); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.16s;
}
.dx-iconbtn:hover{ color:var(--ink); border-color:var(--line); box-shadow:var(--shadow-sm); }

/* ---------- buttons ---------- */
.dx-btn{
  font-family:var(--body); font-weight:600; font-size:15px;
  display:inline-flex; align-items:center; gap:9px; cursor:pointer;
  padding:12px 20px; border-radius:999px; border:1px solid var(--border);
  background:var(--bg-soft); color:var(--ink); transition:.16s; white-space:nowrap;
}
.dx-btn:hover{ box-shadow:var(--shadow-sm); border-color:var(--line); }
.dx-btn-primary{ background:var(--clay); border-color:var(--clay); color:#fff; }
.dx-btn-primary:hover{ background:var(--clay-deep); border-color:var(--clay-deep); box-shadow:0 6px 16px rgba(190,111,74,.28); }
.dx-btn-sm{ padding:9px 15px; font-size:14px; }

/* ---------- chips / tags ---------- */
.dx-chip{
  font-family:var(--body); font-weight:600; font-size:13px; color:var(--ink-soft);
  padding:6px 13px; border-radius:999px; border:1px solid var(--border);
  background:var(--bg-soft); display:inline-flex; align-items:center; gap:6px; cursor:pointer;
  transition:.14s; white-space:nowrap;
}
.dx-chip:hover{ border-color:var(--clay); color:var(--clay); }
.dx-chip.is-active{ background:var(--clay); border-color:var(--clay); color:#fff; }
.dx-chip.tiny{ font-size:11.5px; padding:4px 10px; }

/* ---------- category tabs ---------- */
.dx-tabs{ display:flex; align-items:center; gap:6px; }
.dx-tab{
  font-family:var(--body); font-weight:600; font-size:15px; color:var(--ink-soft);
  padding:9px 17px; border-radius:999px; cursor:pointer; transition:.15s; white-space:nowrap;
  border:1px solid transparent;
}
.dx-tab:hover{ color:var(--ink); background:rgba(63,58,49,.04); }
.dx-tab.is-active{ color:var(--ink); background:var(--bg-soft); border-color:var(--border); box-shadow:var(--shadow-sm); font-weight:700; }

/* ---------- garment tile (placeholder for bg-removed photo) ---------- */
.dx-tile{
  position:relative; border-radius:var(--r-md); overflow:hidden;
  background:var(--surface);
  display:flex; align-items:center; justify-content:center;
  border:1px solid var(--border-soft);
}
.dx-tile .hatch{
  position:absolute; inset:0; opacity:.7;
  background-image:repeating-linear-gradient(45deg, transparent 0 11px, rgba(63,58,49,.045) 11px 12px);
}
.dx-tile .cap-stack{ position:relative; display:flex; flex-direction:column; align-items:center; gap:7px; }
.dx-tile .cap-lbl{
  font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase;
  color:rgba(63,58,49,.4);
}
.dx-tile .swatch{
  position:absolute; top:9px; left:9px; width:13px; height:13px; border-radius:50%;
  box-shadow:0 0 0 2px rgba(251,248,241,.9), 0 1px 2px rgba(0,0,0,.18);
}

/* ---------- closet card ---------- */
.dx-itemcard{
  background:var(--bg-soft); border:1px solid var(--border-soft); border-radius:var(--r-lg);
  padding:10px; transition:transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .18s, border-color .18s;
  position:relative; cursor:pointer;
}
.dx-itemcard:hover{ transform:translateY(-5px); box-shadow:var(--shadow-lg); border-color:var(--line); }
.dx-itemcard .quick{ position:absolute; top:18px; right:18px; display:flex; gap:6px; opacity:0; transform:translateY(-4px); transition:.18s; z-index:2; }
.dx-itemcard:hover .quick{ opacity:1; transform:none; }
.dx-quickbtn{
  width:34px; height:34px; border-radius:999px; border:none; cursor:pointer;
  background:rgba(251,248,241,.94); color:var(--ink); box-shadow:var(--shadow-md);
  display:flex; align-items:center; justify-content:center; transition:.14s;
}
.dx-quickbtn:hover{ background:var(--clay); color:#fff; }

.dx-itemmeta{ padding:11px 6px 5px; }
.dx-itemname{ font-family:var(--body); font-weight:600; font-size:15px; color:var(--ink); margin:0 0 7px; letter-spacing:-.01em; }

/* ---------- soft card ---------- */
.dx-panel{ background:var(--bg-soft); border:1px solid var(--border-soft); border-radius:var(--r-lg); }

/* ---------- stat ---------- */
.dx-stat-n{ font-family:var(--display); font-weight:700; letter-spacing:-.02em; line-height:1; color:var(--ink); }

/* divider */
.dx-div{ height:1px; background:var(--border); border:0; margin:0; }

/* scroll row helpers */
.dx-row{ display:flex; gap:16px; overflow-x:auto; scroll-snap-type:x mandatory; padding-bottom:6px; }
.dx-row > *{ scroll-snap-align:start; flex:0 0 auto; }

/* hide scrollbar where we want clean rails */
.no-bar{ scrollbar-width:none; }
.no-bar::-webkit-scrollbar{ display:none; }

/* input */
.dx-input{
  font-family:var(--body); font-size:16px; color:var(--ink); width:100%;
  background:transparent; border:none; border-bottom:1.5px solid var(--line);
  padding:9px 2px; outline:none; transition:.16s;
}
.dx-input::placeholder{ color:var(--faint); }
.dx-input:focus{ border-color:var(--clay); }
</style>
</head>
